    <div id="toast" class="fixed bottom-6 right-6 bg-gray-800 text-white px-6 py-3 rounded shadow-2xl transition-all duration-300 transform translate-y-20 z-50">
        Status dipaparkan di sini
    </div>

    <script>
        const htmlInput = document.getElementById('htmlInput');
        const lineNumbers = document.getElementById('lineNumbers');
        const previewFrame = document.getElementById('previewFrame');
        const fileNameInput = document.getElementById('fileNameInput');
        const toast = document.getElementById('toast');

        function handleInput() {
            syncLines();
        }

        function syncLines() {
            const lines = htmlInput.value.split('\n').length;
            let lineStr = '';
            for (let i = 1; i <= Math.max(lines, 20); i++) {
                lineStr += i + '<br>';
            }
            lineNumbers.innerHTML = lineStr;
        }

        function syncScroll() {
            lineNumbers.scrollTop = htmlInput.scrollTop;
        }

        function runCode() {
            const code = htmlInput.value;
            const previewDoc = previewFrame.contentDocument || previewFrame.contentWindow.document;
            
            previewDoc.open();
            previewDoc.write(code);
            previewDoc.close();
            
            showToast("Kod Berjaya Dijalankan!");
        }

        function downloadHTML() {
            const code = htmlInput.value;
            if (!code.trim()) {
                showToast("Ralat: Kod tidak boleh kosong!");
                return;
            }

            let name = fileNameInput.value.trim();
            if (!name) {
                const tarikh = new Date().toISOString().slice(0,10);
                name = `kulas_projek_${tarikh}`;
            }

            if (!name.toLowerCase().endsWith('.html')) {
                name += '.html';
            }

            try {
                const blob = new Blob([code], { type: 'text/html' });
                const url = URL.createObjectURL(blob);
                const pautan = document.createElement('a');
                pautan.href = url;
                pautan.download = name;
                document.body.appendChild(pautan);
                pautan.click();
                
                setTimeout(() => {
                    document.body.removeChild(pautan);
                    window.URL.revokeObjectURL(url);
                    showToast(`Fail "${name}" Berjaya Disimpan!`);
                }, 100);
            } catch (err) {
                showToast("Ralat Sistem: Gagal menyimpan fail.");
            }
        }

        function clearAll() {
            if (confirm("Adakah anda pasti mahu memadamkan semua kod?")) {
                htmlInput.value = "";
                syncLines();
                runCode();
                showToast("Editor dikosongkan.");
            }
        }

        function showToast(msg) {
            toast.innerText = msg;
            toast.classList.remove('translate-y-20');
            setTimeout(() => {
                toast.classList.add('translate-y-20');
            }, 3000);
        }

        function toggleFullscreen() {
            const output = document.getElementById('outputPane');
            if (output.style.width === '100%') {
                output.style.width = '45%';
            } else {
                output.style.width = '100%';
            }
        }

        window.onload = () => {
            syncLines();
            runCode();
        };

        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'Enter') {
                e.preventDefault();
                runCode();
            }
        });
    </script>
</body>
